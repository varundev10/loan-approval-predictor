<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Approval Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="page">
        <section class="card">
            <h1>Loan Approval Predictor</h1>
            <p class="subtitle">Enter the applicant details below to predict loan approval.</p>

            <form action="{{ url_for('predict_data') }}" method="post" class="grid">
                <label>Number of Dependents
                    <select name="no_of_dependents">
                        <option>0</option>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                        <option>5</option>
                    </select>
                </label>
                <label>Education
                    <select name="education">
                        <option>Graduate</option>
                        <option>Not Graduate</option>
                    </select>
                </label>
                <label>Self Employed
                    <select name="self_employed">
                        <option>No</option>
                        <option>Yes</option>
                    </select>
                </label>
                <label>Annual Income
                    <input type="number" name="income_annum" step="any" required>
                </label>
                <label>Loan Amount
                    <input type="number" name="loan_amount" step="any" required>
                </label>
                <label>Loan Term
                    <input type="number" name="loan_term" step="any" required>
                </label>
                <label>CIBIL Score
                    <input type="number" name="cibil_score" step="any" required>
                </label>
                <label>Residential Assets Value
                    <input type="number" name="residential_assets_value" step="any" required>
                </label>
                <label>Commercial Assets Value
                    <input type="number" name="commercial_assets_value" step="any" required>
                </label>
                <label>Luxury Assets Value
                    <input type="number" name="luxury_assets_value" step="any" required>
                </label>
                <label>Bank Asset Value
                    <input type="number" name="bank_asset_value" step="any" required>
                </label>
                <button type="submit">Predict</button>
            </form>

            {% if results %}
            <div class="result success">Prediction: {{ results }}</div>
            {% endif %}

            {% if error %}
            <div class="result error">{{ error }}</div>
            {% endif %}
        </section>
    </main>
</body>
</html>
