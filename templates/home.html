<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Approval Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="page">
        <section class="card">
            <h1>Loan Approval Predictor</h1>
            <p class="subtitle">Enter the applicant details below to predict loan approval.</p>

            <form action="{{ url_for('predict_data') }}" method="post" class="grid">
                <label>Number of Dependents
                    <select name="no_of_dependents">
                        <option>0</option>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                        <option>5</option>
                    </select>
                    <small>Range: 0 to 5</small>
                </label>
                <label>Education
                    <select name="education">
                        <option>Graduate</option>
                        <option>Not Graduate</option>
                    </select>
                    <small>Choose one of the two categories</small>
                </label>
                <label>Self Employed
                    <select name="self_employed">
                        <option>No</option>
                        <option>Yes</option>
                    </select>
                    <small>Choose Yes or No</small>
                </label>
                <label>Annual Income
                    <input type="number" name="income_annum" step="any" min="200000" max="9900000" placeholder="Example: 9600000 (range 200000 to 9900000)" required>
                    <small>Dataset range: 200000 to 9900000</small>
                </label>
                <label>Loan Amount
                    <input type="number" name="loan_amount" step="any" min="300000" max="39500000" placeholder="Example: 29900000 (range 300000 to 39500000)" required>
                    <small>Dataset range: 300000 to 39500000</small>
                </label>
                <label>Loan Term
                    <input type="number" name="loan_term" step="any" min="2" max="20" placeholder="Example: 12 years (range 2 to 20)" required>
                    <small>Dataset range: 2 to 20</small>
                </label>
                <label>CIBIL Score
                    <input type="number" name="cibil_score" step="any" min="300" max="900" placeholder="Example: 778 (range 300 to 900)" required>
                    <small>Dataset range: 300 to 900</small>
                </label>
                <label>Residential Assets Value
                    <input type="number" name="residential_assets_value" step="any" min="-100000" max="29100000" placeholder="Example: 2400000 (range -100000 to 29100000)" required>
                    <small>Dataset range: -100000 to 29100000</small>
                </label>
                <label>Commercial Assets Value
                    <input type="number" name="commercial_assets_value" step="any" min="0" max="19400000" placeholder="Example: 17600000 (range 0 to 19400000)" required>
                    <small>Dataset range: 0 to 19400000</small>
                </label>
                <label>Luxury Assets Value
                    <input type="number" name="luxury_assets_value" step="any" min="300000" max="39200000" placeholder="Example: 22700000 (range 300000 to 39200000)" required>
                    <small>Dataset range: 300000 to 39200000</small>
                </label>
                <label>Bank Asset Value
                    <input type="number" name="bank_asset_value" step="any" min="0" max="14700000" placeholder="Example: 8000000 (range 0 to 14700000)" required>
                    <small>Dataset range: 0 to 14700000</small>
                </label>
                <button type="submit">Predict</button>
            </form>

            {% if results %}
            <div class="result success">Prediction: {{ results }}</div>
            {% endif %}

            {% if error %}
            <div class="result error">{{ error }}</div>
            {% endif %}
        </section>
    </main>
</body>
</html>
